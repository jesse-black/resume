cv:
  name: Jesse Black
  headline: Staff Software Engineer
  location: Chicago, IL
  email: jesse.w.black@gmail.com
  photo:
  phone:
  website:
  social_networks:
    - network: LinkedIn
      username: jessewblack
  custom_connections:
  sections:
    skills:
      - label: Identity & Security
        details: OAuth2, OpenID, Single Sign-On (SSO), Identity Provider (IdP), Identity and Access Management, Access Control Systems
      - label: Cloud & Platform
        details: Azure Cloud Platform (Event Hub/Kafka, Service Bus, Functions, Blob Storage), Amazon Web Services (Lambda, S3), Terraform, Docker, Microservices, Platform Integration, iPaaS Integration, App Marketplace
      - label: APIs & Data
        details: JSON REST API Architecture, Public Developer API, OpenAPI / Swagger API Documentation, Distributed Event Streaming
      - label: Languages & Frameworks
        details: C# .NET, SQL, Node.js, Java, Kotlin, Python, Typescript, Javascript, React, Vue, Micro Frontends (MFE), Sass, Tailwind
      - label: Databases
        details: MS SQL Server, SQLite, Redis
      - label: Methodology
        details: Agile Development, Test Driven Development, Containerized Tests
    experience:
      - company: ShipBob
        position: Staff Software Engineer
        start_date: 2022-11
        end_date: 2025-10
        location: Chicago, IL
        summary:
        highlights:
          - Led team that executed a massive overhaul and rebuild of the identity and access management system using IdentityServer IDP providing OAuth2 and OpenID authentication and authorization; enabling fulfillment center warehouse management to create and manage associate workers' logins without time consuming IT tickets; enabling the company to scale from a few dozen fulfillment centers to hundreds and beyond without being bottlenecked by IT provisioning of accounts.
          - Architected and built fulfillment center shipment service to track and manage shipping orders using high speed data streaming and event ingestion technologies including Event Hub (Kafka compatible) and Service Bus to modernize shipment data handling, decouple from the legacy monolith and enable tenantization and sharding of services.
          - Built the technology enabling all engineering department teams to embed micro frontends (MFE) in the iOS app while securely transferring API access from iOS to MFE for seamless single sign-on.
      - company: ShipBob
        position: Senior Software Engineer
        start_date: 2018-12
        end_date: 2022-11
        location: Chicago, IL
        summary:
        highlights:
          - Led team that built a new App Marketplace using OAuth 2.0, Developer API, and integration with an iPaaS, and developed 6 new App Marketplace integrations with eCommerce storefronts.
          - Developed and maintained access control systems using IdentityServer, OAuth 2.0 to secure access to Developer API.
          - Developed and documented many of the API endpoints in [ShipBob Developer API](https://developer.shipbob.com/), and designed and built the developer API documentation system that collates OpenAPI documents from multiple microservices into a single reference site.
      - company: The Nerdery
        position: Software Engineer
        start_date: 2015-11
        end_date: 2018-10
        location: Chicago, IL
        summary:
        highlights:
          - Built and delivered custom web and desktop applications for enterprise and nationally recognized private clients in a fast-paced consulting environment.
          - Worked directly with client stakeholders to define requirements, estimate effort, and implement maintainable, scalable solutions on .NET and SQL Server.
    education:
      - institution: Rochester Institute of Technology
        area: Computer Science
        degree: Bachelor of Science
        location: Rochester, NY
        highlights:
          - Minor in Mathematics
