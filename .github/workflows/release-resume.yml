name: Release Resume

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user "rendercv[full]==2.8"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render resume
        run: rendercv render Jesse_Black_Resume.yaml

      - name: Prepare release asset
        run: |
          cp rendercv_output/Jesse_Black_Resume.pdf \
            "rendercv_output/Jesse_Black_Resume-${GITHUB_REF_NAME}.pdf"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          name: Resume ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: rendercv_output/Jesse_Black_Resume-${{ github.ref_name }}.pdf
