name: Release Resume

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user "rendercv[full]==2.8"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render resume
        run: rendercv render Jesse_Black_Resume.yaml

      - name: Update checked-in resume outputs
        run: |
          cp rendercv_output/Jesse_Black_Resume.pdf Jesse_Black_Resume.pdf
          python3 .github/scripts/update_readme.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md Jesse_Black_Resume.pdf
          if ! git diff --staged --quiet; then
            git commit -m "chore: update rendered resume [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Prepare release asset
        run: |
          cp rendercv_output/Jesse_Black_Resume.pdf \
            "rendercv_output/Jesse_Black_Resume-${GITHUB_REF_NAME}.pdf"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ github.token }}
          name: Resume ${{ github.ref_name }}
          body_path: rendercv_output/Jesse_Black_Resume.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: rendercv_output/Jesse_Black_Resume-${{ github.ref_name }}.pdf
